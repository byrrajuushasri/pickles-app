<script>
const sliders = {
  mango: { index: 0, el: document.getElementById("mangoSlider"), dots: document.querySelectorAll(".dot-mango") },
  pickle: { index: 0, el: document.getElementById("pickleSlider"), dots: document.querySelectorAll(".dot-pickle") },
  banner: { index: 0, el: document.getElementById("bannerSlider"), dots: document.querySelectorAll(".dot-banner") },
  special: { index: 0, el: document.getElementById("specialSlider"), dots: document.querySelectorAll(".dot-special") }
};

function goSlide(type, index) {
  const s = sliders[type];
  s.index = index;
  update(type);
}

function update(type) {
  const s = sliders[type];

  s.el.style.transform = `translateX(-${s.index * 100}%)`;

  s.dots.forEach((dot, i) => {
    dot.classList.toggle("bg-gray-800", i === s.index);
    dot.classList.toggle("bg-gray-300", i !== s.index);
  });
}

// AUTO SLIDE ALL
setInterval(() => {
  Object.keys(sliders).forEach(type => {
    const s = sliders[type];
    s.index = (s.index + 1) % s.dots.length;
    update(type);
  });
}, 4000);
</script>
