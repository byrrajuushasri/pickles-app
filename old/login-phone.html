<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-pink-200 via-pink-100 to-pink-200">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl">

  <!-- Title -->
  <h2 class="text-3xl font-bold text-center text-pink-500 mb-6">
    Mobile Login 📱
  </h2>

  <!-- Step 1: Mobile -->
  <div id="mobileStep">
    <label class="block text-sm mb-2">Mobile Number</label>
    <input id="mobile" type="tel" placeholder="Enter mobile number"
      class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-pink-400 outline-none">

    <button onclick="sendOTP()"
      class="w-full mt-4 bg-pink-500 text-white py-2 rounded-lg hover:bg-pink-600">
      Send OTP
    </button>
  </div>

  <!-- Step 2: OTP -->
  <div id="otpStep" class="hidden">

    <p class="text-sm text-gray-600 mb-2">
      OTP sent to <span id="showMobile" class="font-semibold"></span>
    </p>

    <div class="flex gap-2 justify-between">
      <input maxlength="1" class="otp-box border p-2 w-12 text-center rounded">
      <input maxlength="1" class="otp-box border p-2 w-12 text-center rounded">
      <input maxlength="1" class="otp-box border p-2 w-12 text-center rounded">
      <input maxlength="1" class="otp-box border p-2 w-12 text-center rounded">
    </div>

    <button onclick="verifyOTP()"
      class="w-full mt-4 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">
      Verify OTP
    </button>

    <!-- Resend -->
    <p class="text-sm text-center mt-4">
      <span id="timer">Resend in 30s</span><br>
      <button onclick="resendOTP()" id="resendBtn" class="text-pink-500 hidden">
        Resend OTP
      </button>
    </p>

  </div>

</div>

<script>
let generatedOTP = "";
let countdown;

function sendOTP() {
  const mobile = document.getElementById("mobile").value;

  if(mobile.length < 10){
    alert("Enter valid mobile number");
    return;
  }

  // Generate OTP (demo)
  generatedOTP = Math.floor(1000 + Math.random() * 9000);
  alert("Demo OTP: " + generatedOTP); // remove in production

  document.getElementById("showMobile").innerText = mobile;
  document.getElementById("mobileStep").classList.add("hidden");
  document.getElementById("otpStep").classList.remove("hidden");

  startTimer();
}

function verifyOTP(){
  const inputs = document.querySelectorAll(".otp-box");
  let enteredOTP = "";

  inputs.forEach(input => enteredOTP += input.value);

  if(enteredOTP == generatedOTP){
    alert("Login Successful 🎉");
  } else {
    alert("Invalid OTP ❌");
  }
}

function startTimer(){
  let time = 30;
  const timerText = document.getElementById("timer");
  const resendBtn = document.getElementById("resendBtn");

  resendBtn.classList.add("hidden");

  countdown = setInterval(()=>{
    time--;
    timerText.innerText = `Resend in ${time}s`;

    if(time <= 0){
      clearInterval(countdown);
      timerText.innerText = "";
      resendBtn.classList.remove("hidden");
    }
  },1000);
}

function resendOTP(){
  sendOTP();
}

// Auto focus next box
document.addEventListener("input", (e)=>{
  if(e.target.classList.contains("otp-box")){
    if(e.target.value.length === 1){
      e.target.nextElementSibling?.focus();
    }
  }
});
</script>

</body>
</html>
